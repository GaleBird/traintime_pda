name: Release for Android

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag name, for example v1.0.1+41
        required: true
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PROPERTIES_PATH: "./android/key.properties"

permissions:
  contents: write

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
  
      - name: Install Flutter
        run: |
          java -version
          chmod +x .flutter/bin/flutter

      - name: Prepare Flutter Dependencies
        run: |
          .flutter/bin/flutter config --no-analytics
          .flutter/bin/flutter pub get

      - name: Signing APK
        run: |
          echo keyPassword=\${{ secrets.SIGNING_PASSWORD }} > ${{env.PROPERTIES_PATH}}
          echo storePassword=\${{ secrets.SIGNING_PASSWORD }} >> ${{env.PROPERTIES_PATH}}
          echo keyAlias=\${{ secrets.SIGNING_ALIAS }} >> ${{env.PROPERTIES_PATH}}
          echo storeFile=key.jks >> ${{env.PROPERTIES_PATH}}
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > android/app/key.jks

      - name: Build APK
        run: |
          set -o pipefail
          .flutter/bin/flutter build apk --split-per-abi --verbose 2>&1 | tee build_apk.log

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-build-log
          path: build_apk.log

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: >
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk,
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk,
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          prerelease: false
          name: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag_name }}
          tag_name: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag_name }}
          token: ${{ secrets.RELEASE_TOKEN }}
