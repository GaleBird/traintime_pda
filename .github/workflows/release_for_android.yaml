name: Release for Android

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag name, for example v1.0.1+41
        required: true
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PROPERTIES_PATH: "./android/key.properties"
  KEYSTORE_PATH: "./android/app/key.jks"
  BUILD_LOG_PATH: "build_apk.log"
  UPDATE_MANIFEST_PATH: "manifests/update.json"
  UPDATE_MANIFEST_SIGNING_KEY_PATH: "./tmp/update_manifest_private.pem"

permissions:
  contents: write

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
  
      - name: Install Flutter
        run: |
          java -version
          chmod +x .flutter/bin/flutter

      - name: Prepare Flutter Dependencies
        run: |
          .flutter/bin/flutter config --no-analytics
          .flutter/bin/flutter pub get

      - name: Init Build Log
        shell: bash
        run: |
          set -euo pipefail
          echo "=== Android release build: $(date -u +'%Y-%m-%dT%H:%M:%SZ') ===" > "${{ env.BUILD_LOG_PATH }}"

      - name: Prepare Signing Keystore
        shell: bash
        run: |
          set -euo pipefail
          {
            mkdir -p "$(dirname "${{ env.KEYSTORE_PATH }}")"
            printf '%s' "${{ secrets.SIGNING_KEY }}" | base64 --decode > "${{ env.KEYSTORE_PATH }}"

            # Detect actual keystore type (JKS vs PKCS12). Hardcoding JKS can fail if the keystore is PKCS12.
            STORE_TYPE=""
            if keytool -list -keystore "${{ env.KEYSTORE_PATH }}" -storetype JKS -storepass "${{ secrets.SIGNING_PASSWORD }}" > /dev/null 2>&1; then
              STORE_TYPE="JKS"
            elif keytool -list -keystore "${{ env.KEYSTORE_PATH }}" -storetype PKCS12 -storepass "${{ secrets.SIGNING_PASSWORD }}" > /dev/null 2>&1; then
              STORE_TYPE="PKCS12"
            else
              echo "::error::Keystore cannot be opened as JKS or PKCS12. Check SIGNING_KEY (base64 of the keystore file, encoded once) and SIGNING_PASSWORD."
              exit 1
            fi

            echo "Detected keystore storeType=${STORE_TYPE}"

            cat > "${{ env.PROPERTIES_PATH }}" <<EOF
          keyPassword=${{ secrets.SIGNING_PASSWORD }}
          storePassword=${{ secrets.SIGNING_PASSWORD }}
          storeType=${STORE_TYPE}
          keyAlias=${{ secrets.SIGNING_ALIAS }}
          storeFile=key.jks
          EOF
          } 2>&1 | tee -a "${{ env.BUILD_LOG_PATH }}"

      - name: Build APK
        shell: bash
        run: |
          set -euo pipefail
          .flutter/bin/flutter build apk --split-per-abi --verbose 2>&1 | tee -a "${{ env.BUILD_LOG_PATH }}"

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-release-build-log
          path: ${{ env.BUILD_LOG_PATH }}
          if-no-files-found: ignore

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: >
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk,
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk,
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          prerelease: false
          generate_release_notes: false
          body_path: release_notes.md
          name: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag_name }}
          tag_name: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag_name }}
          token: ${{ github.token }}

      - name: Load Release Metadata
        id: release_metadata
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag_name }}
        with:
          script: |
            const fs = require('fs');
            const tag = process.env.RELEASE_TAG;
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            fs.writeFileSync('release_body.txt', release.data.body ?? '', 'utf8');
            core.setOutput('html_url', release.data.html_url);

      - name: Validate Spaces Settings
        shell: bash
        env:
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
          DO_SPACES_CDN_BASE_URL: ${{ secrets.DO_SPACES_CDN_BASE_URL }}
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          UPDATE_MANIFEST_SIGNING_KEY: ${{ secrets.UPDATE_MANIFEST_SIGNING_KEY }}
        run: |
          set -euo pipefail
          for key in \
            DO_SPACES_BUCKET \
            DO_SPACES_REGION \
            DO_SPACES_CDN_BASE_URL \
            DO_SPACES_KEY \
            DO_SPACES_SECRET \
            UPDATE_MANIFEST_SIGNING_KEY; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required GitHub secret: ${key}"
              exit 1
            fi
          done

      - name: Install Release Python Tools
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --user awscli cryptography
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare Update Manifest Signing Key
        shell: bash
        env:
          UPDATE_MANIFEST_SIGNING_KEY: ${{ secrets.UPDATE_MANIFEST_SIGNING_KEY }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${{ env.UPDATE_MANIFEST_SIGNING_KEY_PATH }}")"
          printf '%s' "${UPDATE_MANIFEST_SIGNING_KEY}" > "${{ env.UPDATE_MANIFEST_SIGNING_KEY_PATH }}"
          chmod 600 "${{ env.UPDATE_MANIFEST_SIGNING_KEY_PATH }}"

      - name: Generate Update Manifest
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag_name }}
          RELEASE_URL: ${{ steps.release_metadata.outputs.html_url }}
          DO_SPACES_CDN_BASE_URL: ${{ secrets.DO_SPACES_CDN_BASE_URL }}
        run: |
          set -euo pipefail
          python3 tool/generators/generate_update_manifest.py \
            --tag "${RELEASE_TAG}" \
            --release-url "${RELEASE_URL}" \
            --cdn-base-url "${DO_SPACES_CDN_BASE_URL}" \
            --body-file release_body.txt \
            --output update.json \
            --signing-key "${{ env.UPDATE_MANIFEST_SIGNING_KEY_PATH }}" \
            --key-id "update-manifest-rsa-sha256-v1" \
            --asset-path build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            --asset-path build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            --asset-path build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Upload APK and Manifest to Spaces
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag_name }}
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_REGION: ${{ secrets.DO_SPACES_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.DO_SPACES_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DO_SPACES_SECRET }}
          AWS_REGION: ${{ secrets.DO_SPACES_REGION }}
          AWS_DEFAULT_REGION: ${{ secrets.DO_SPACES_REGION }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${DO_SPACES_REGION}.digitaloceanspaces.com"
          RELEASE_DIR="releases/${RELEASE_TAG}"

          for apk in build/app/outputs/flutter-apk/*.apk; do
            aws --endpoint-url "${ENDPOINT}" s3 cp \
              "${apk}" \
              "s3://${DO_SPACES_BUCKET}/${RELEASE_DIR}/$(basename "${apk}")" \
              --acl public-read \
              --cache-control "public, max-age=31536000, immutable" \
              --content-type "application/vnd.android.package-archive"
          done

          aws --endpoint-url "${ENDPOINT}" s3 cp \
            update.json \
            "s3://${DO_SPACES_BUCKET}/${{ env.UPDATE_MANIFEST_PATH }}" \
            --acl public-read \
            --cache-control "no-store, max-age=0" \
            --content-type "application/json"
