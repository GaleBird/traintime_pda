  # internationalized
  device_info_plus: ^12.1.0
  flutter_i18n: ^0.37.1
  flutter_localizations:
    sdk: flutter
  intl:
  timezone: ^0.9.4
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3
  build: ^4.0.4
  build_runner: ^2.6.0
  flutter_lints: ^6.0.0
  glob: ^2.1.2
  pigeon: ^26.0.1
  yaml: ^3.1.3
  json_serializable: ^6.10.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/gxu.png"
  adaptive_icon_background: "#D3D6DA"
  adaptive_icon_foreground: "assets/gxu.png"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter_native_splash:
  color: "#D3D6DA"
  image: "assets/gxu.png"

flutter:
  uses-material-design: true
  assets:
    - assets/gxu.png
    - assets/gxu_name.svg
    - assets/icon_gxu_concept.svg
    - assets/art/aboutRobots-icon.png
    - assets/art/Doraemon_character.png
    - assets/art/pda_empty_cover.jpg
    - assets/art/pda_classtable_empty.png
    - assets/art/pda_girl_default.png
    #    - assets/art/pda_girl_singing.png
    - assets/art/pda_girl_reading.png
    #    - assets/art/Fxemoji_u1F4BE_Kazami_Yuka.png
    # - assets/art/anan_christmas.png
    # - assets/art/Sakura_and_Tomoyo_Kimono.jpg
    - assets/flutter_i18n/zh_CN.yaml
    - assets/flutter_i18n/zh_TW.yaml
    - assets/flutter_i18n/en_US.yaml
    - assets/captcha-solver-payment.tflite
    - assets/captcha-solver-zfw.tflite
